---
# =============================================================================
# File  : roles/__pre_installation_checks/tasks/validate_hostname_fqdn.yml
# Purpose: Validates that the VM's actual FQDN (as reported by the OS via
#          'hostname -f') matches the FQDN declared in the Ansible inventory.
#          Fails immediately with a clear remediation message on mismatch.
#
# WHY 'hostname -f' and NOT ansible_fqdn:
#   ansible_fqdn is resolved via DNS/NSS lookup and may return a value that
#   differs from the OS-configured hostname (e.g. reverse DNS or /etc/hosts
#   aliasing can mask a real mismatch). 'hostname -f' always returns what the
#   OS kernel + /etc/hostname + /etc/hosts have configured locally.
#
# Prerequisites:
#   - gather_facts: true must be set on the calling play (it already is).
#   - ansible_host_fqdn (optional per-host override in inventory/host_vars)
# =============================================================================

# -----------------------------------------------------------------------------
# 1. Get the true FQDN directly from the OS using 'hostname -f'
# -----------------------------------------------------------------------------
- name: "FQDN CHECK | Retrieve actual FQDN from OS via 'hostname -f'"
  ansible.builtin.command: hostname -f
  register: _hostname_f_result
  changed_when: false
  tags:
    - check-hostname-fqdn

# -----------------------------------------------------------------------------
# 2. Set expected vs actual facts
# -----------------------------------------------------------------------------
- name: "FQDN CHECK | Resolve expected and actual FQDNs"
  ansible.builtin.set_fact:
    _fqdn_expected: "{{ ansible_host_fqdn | default(inventory_hostname) }}"
    _fqdn_actual:   "{{ _hostname_f_result.stdout | trim }}"
  tags:
    - check-hostname-fqdn

# -----------------------------------------------------------------------------
# 3. Show identity summary
# -----------------------------------------------------------------------------
- name: "FQDN CHECK | Display identity summary"
  ansible.builtin.debug:
    msg:
      - "------------------------------------------------------"
      - " Hostname / FQDN Validation"
      - "------------------------------------------------------"
      - "  Inventory entry        : {{ inventory_hostname }}"
      - "  Expected FQDN          : {{ _fqdn_expected }}"
      - "  Actual FQDN  : {{ _fqdn_actual }}"
      - "------------------------------------------------------"
  tags:
    - check-hostname-fqdn

# -----------------------------------------------------------------------------
# 4. Core check — fail immediately on mismatch
# -----------------------------------------------------------------------------
- name: "FQDN CHECK | Fail if actual FQDN does not match inventory"
  fail:
    msg: >-
      Hostname/FQDN mismatch detected on '{{ inventory_hostname }}'.
      Expected FQDN : '{{ _fqdn_expected }}'
      Actual FQDN   : '{{ _fqdn_actual }}'
      To continue, please correct the hostname on this node by running:
        sudo hostnamectl set-hostname {{ _fqdn_expected }}
      Then verify with:
        hostname -f
      Alternatively, update the inventory entry to match the actual FQDN:
        {{ _fqdn_actual }}
  when:
    - _fqdn_actual is defined
    - _fqdn_expected is defined
    - _fqdn_actual != _fqdn_expected
  tags:
    - check-hostname-fqdn