---
- name: Validate inventory hostname
  ansible.builtin.assert:
    that:
      - inventory_hostname is zxbot.sps_ansible_addons.fqdn_check
    fail_msg: >-
      Invalid syntax for inventory hostname '{{ inventory_hostname }}'.
      Inventory must contain valid FQDN values only.
      Example: host.example.com
  tags:
    - check-inventory-values

- name: Validate default_domain
  ansible.builtin.assert:
    that:
      - default_domain is zxbot.sps_ansible_addons.fqdn_check
    fail_msg: >-
      Invalid syntax for 'default_domain': '{{ default_domain | default("UNDEFINED") }}'.
      This variable must contain the default mail domain.
      Example: domain.com
  when: default_domain is defined
  tags:
    - check-inventory-values

- name: Validate webmailHostname
  ansible.builtin.assert:
    that:
      - webmailHostname is zxbot.sps_ansible_addons.fqdn_check
    fail_msg: >-
      Invalid syntax for 'webmailHostname': '{{ webmailHostname | default("UNDEFINED") }}'.
      This variable must contain the hostname used to access webmail.
      Example: webmail.example.com
  when: webmailHostname is defined
  tags:
    - check-inventory-values

- name: Validate public_ip_address for video servers
  ansible.builtin.assert:
    that:
      - public_ip_address is defined
      - (public_ip_address | ansible.utils.ipaddr('address')) is truthy
    fail_msg: >-
      Invalid syntax for 'public_ip_address': '{{ public_ip_address | default("") }}'.
      Video servers must define a valid IP address.
      Example: 192.0.2.10
  when: inventory_hostname in (groups['videoServers'] | default([]))
  tags:
    - check-inventory-values