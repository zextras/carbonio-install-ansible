---
  - name: Install Notification Push on WSC Server [Ubuntu]
    become: true
    apt: name={{ item }} state=present
    with_items:
      - "{{ notification_push_packages }}"
    when: ansible_facts.os_family == "Debian"  and inventory_hostname in groups["workStreamServers"] 
    tags:
      - install-carbonio-ws
      - install-carbonio-notification-push

      

### RHEL
  - name: Install Notification Push on WSC Server [RHEL]
    become: true
    yum: name={{ item }} state=present
    with_items:
      - "{{ notification_push_packages }}"
    when: (ansible_facts.os_family == "RedHat" or ansible_facts.os_family == "CentOS") and inventory_hostname in groups["workStreamServers"] 
    tags:
      - install-carbonio-ws
      - install-carbonio-notification-push
