---
  - name: Install Carbonio preview Ubuntu
    become: true
    apt: name={{ item }} state=present
    with_items:
      - "{{ preview_packages }}"
    when: ansible_os_family == "Debian"  and inventory_hostname in groups["previewServers"] 
    tags:
      - install-carbonio-preview

  - name: Install Carbonio Docs Editor Ubuntu 
    become: true
    apt: name={{ item }} state=present
    with_items:
      - "{{ preview_dependencies_packages }}"
    when: ansible_os_family == "Debian"  and inventory_hostname in groups["previewServers"] and groups['docsServers'] | length == 0
    tags:
      - install-carbonio-preview

  - name: Install Carbonio preview RHEL
    become: true
    yum: name={{ item }} state=present
    with_items:
      - "{{ preview_packages }}"
    when: (ansible_os_family == "RedHat" or ansible_os_family == "CentOS") and inventory_hostname in groups["previewServers"] 
    tags:
      - install-carbonio-preview

  - name: Install Carbonio Docs Editor RHEL
    become: true
    yum: name={{ item }} state=present
    with_items:
      - "{{ preview_dependencies_packages }}"
    when: (ansible_os_family == "RedHat" or ansible_os_family == "CentOS") and inventory_hostname in groups["previewServers"] and groups['docsServers'] | length == 0
    tags:
      - install-carbonio-preview
     