---
  - name: Install Syslog Server Ubuntu
    become: true
    apt: name={{ item }} state=present
    with_items:
      - "{{ syslog_packages }}"    
    when: ansible_facts.os_family == "Debian" and inventory_hostname in groups["syslogServer"]
    tags:
      - install-carbonio-syslog
      
  - name: Install Syslog Server RHEL
    yum: name={{ item }} state=present
    with_items:
      - "{{ syslog_packages }}"    
    when: (ansible_facts.os_family == "RedHat" or ansible_facts.os_family == "CentOS") and inventory_hostname in groups["syslogServer"]
    tags:
      - install-carbonio-syslog
