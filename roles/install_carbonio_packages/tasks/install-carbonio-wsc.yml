---
  - name: Install WorkStream on Server [Ubuntu]
    become: true
    apt: name={{ item }} state=present
    with_items:
      - "{{ workstream_packages }}"
    when: ansible_facts.os_family == "Debian"  and inventory_hostname in groups["workStreamServers"] 
    tags:
      - install-carbonio-ws

  - name: Install Message Dispatcher on Server [Ubuntu]
    become: true
    apt: name={{ item }} state=present
    with_items:
      - "{{ message_dispatcher_packages }}"
    when: ansible_facts.os_family == "Debian" and groups["workStreamServers"] | length > 0 and inventory_hostname in groups["workStreamServers"][0]
    tags:
      - install-carbonio-ws

### RHEL
  - name: Install WorkStream on Server [RHEL]
    become: true
    yum: name={{ item }} state=present
    with_items:
      - "{{ workstream_packages }}"
    when: (ansible_facts.os_family == "RedHat" or ansible_facts.os_family == "CentOS") and inventory_hostname in groups["workStreamServers"] 
    tags:
      - install-carbonio-ws

  - name: Install Message Dispatcher on Server [RHEL]
    become: true
    yum: name={{ item }} state=present
    with_items:
      - "{{ message_dispatcher_packages }}"
    when: (ansible_facts.os_family == "RedHat" or ansible_facts.os_family == "CentOS") and groups["workStreamServers"] | length > 0 and inventory_hostname in groups["workStreamServers"][0] 
    tags:
      - install-carbonio-ws