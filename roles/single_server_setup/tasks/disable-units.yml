---
  - name: Stop and disable unnecessary servises
    ansible.builtin.systemd:
      name: "{{ item }}"
      state: stopped 
      enabled: false
    with_items:
      - "{{ unnecessary_services }}"
    when: inventory_hostname in groups["mtaServers"]
    tags:
      - disable-unnecessary-services
  
  - name: Remove hcl files
    ansible.builtin.file:
      path: "{{ item }}"
      state: absent
    with_items:
      - "{{ hcl_paths }}"
    become: yes
    when: inventory_hostname in groups["mtaServers"]
    tags:
      - disable-unnecessary-services

  - name: Get list of carbonio-prometheus services
    shell: "systemctl list-units --state=active 'carbonio-prometheus*' --no-legend | awk '{print $1}'"
    register: services_list
    ignore_errors: true
    changed_when: false
    when: groups['prometheusServers'] | length == 0
    tags:
      - disable-unnecessary-services

  - name: Notify if no carbonio-prometheus services found
    debug:
      msg: "No carbonio-prometheus services found."
    when: 
      - groups['prometheusServers'] | length == 0 
      - services_list is defined
      - services_list.stdout_lines | length == 0
    tags:
      - disable-unnecessary-services
      
  - name: Stop and disable carbonio-prometheus services
    ansible.builtin.systemd:
      name: "{{ item }}"
      state: stopped
      enabled: false
    loop: "{{ services_list.stdout_lines }}"
    when: 
      - groups['prometheusServers'] | length == 0
      - services_list is defined
      - services_list.stdout_lines | length > 0
    notify: restart_service_discover
    tags:
      - disable-unnecessary-services

  # - name: Stop and disable carbonio-prometheus services
  #   shell: "systemctl stop {{ item }} && systemctl mask {{ item }}"
  #   loop: "{{ services_list.stdout_lines }}"
  #   become: yes

  - name: Disable carbonio-stats service on Ubuntu 24 and RHEL 9
    become: true
    ansible.builtin.systemd:
      name: carbonio-stats.service
      enabled: false
      state: stopped
    when:
      - >
        (ansible_facts.distribution == "Ubuntu" and ansible_facts.distribution_major_version == "24")
        or
        (ansible_facts.os_family == "RedHat" and ansible_facts.distribution_major_version == "9")
