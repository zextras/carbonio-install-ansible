---
- hosts: all
  gather_facts: no
  run_once: true
  tasks:
    - name: EULA Acceptance
      pause:
        prompt: |
          ============================================================
          IMPORTANT - LICENSE AGREEMENT
          ============================================================

          The system is going to start configuring all the packages.

          If you are installing Carbonio CE please refer to every
          single package license and to the Github repo for more
          informations on open source licenses:
            https://github.com/Zextras

          If you are also installing Carbonio please refer to every
          single package license, to the Github repo for more
          informations on open source licenses:
            https://github.com/Zextras
          and to the Zextras EULA for the proprietary software:
            https://zextras.com/licenses#zextras-carbonio-eula

          ============================================================
          Type 'YES' and press ENTER to accept and continue: 
      register: eula_acceptance

    - name: Abort if EULA not accepted
      fail:
        msg: >
          Installation aborted. You must type 'YES' to accept the
          license terms and proceed with the installation.
      when: (eula_acceptance.user_input | default('') | upper) != 'YES'

- hosts: all
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/pre_installation_checks
     - ../roles/prepare_carbonio_vms
     - ../roles/install_carbonio_packages

- hosts: masterDirectoryServers, replicaDirectoryServers, postgresServers
  serial: 1
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_cluster_services

- hosts: all, !postgresServers, !masterDirectoryServers, !replicaDirectoryServers
  serial: 1
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_cluster_services

- hosts: masterDirectoryServers, replicaDirectoryServers, postgresServers
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_carbonio
     - ../roles/execute_final_setups

- hosts: all, !postgresServers, !masterDirectoryServers, !replicaDirectoryServers, !videoServers
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_carbonio
     - ../roles/execute_final_setups

- hosts: videoServers
  serial: 1
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_carbonio
     - ../roles/execute_final_setups

- hosts: all
  order: inventory
  gather_facts: yes
  tasks: 
    - name: Update auth keys
      become: true
      become_method: su
      become_user: zextras
      command: '/opt/zextras/bin/zmupdateauthkeys'
