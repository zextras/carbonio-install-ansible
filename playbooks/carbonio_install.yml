---
- hosts: all
  gather_facts: no
  run_once: true
  tasks:
    - name: EULA Acceptance
      pause:
        prompt: |
          ============================================================
          IMPORTANT - LICENSE AGREEMENT
          ============================================================

          The system is going to start configuring all the packages.

          If you are installing Carbonio CE please refer to every
          single package license and to the Github repo for more
          informations on open source licenses:
            https://github.com/Zextras

          If you are also installing Carbonio please refer to every
          single package license, to the Github repo for more
          informations on open source licenses:
            https://github.com/Zextras
          and to the Zextras EULA for the proprietary software:
            https://zextras.com/licenses#zextras-carbonio-eula

          ============================================================
          Type 'YES' and press ENTER to accept and continue: 
      register: eula_acceptance
      when: carbonio_auto_accept_eula is not defined or not (carbonio_auto_accept_eula | bool)

    - name: Auto-accept EULA
      set_fact:
          eula_acceptance:
            user_input: 'YES'
      when: carbonio_auto_accept_eula is defined and (carbonio_auto_accept_eula | bool)

    - name: Abort if EULA not accepted
      fail:
        msg: >
          Installation aborted. You must type 'YES' to accept the
          license terms and proceed with the installation.
      when: (eula_acceptance.user_input | default('') | upper) != 'YES'

    - name: Multi-Server Status
      pause:
        seconds: 10
        prompt: |
          =======================================================
          DETECTED: MULTI-SERVER INSTALLATION
          Proceeding with distributed components setup.
          =======================================================
          (Waiting 10 seconds...)
      when: groups['all'] | length > 1

    - name: Single-Server Status
      pause:
        seconds: 10
        prompt: |
          -------------------------------------------------------
          DETECTED: SINGLE-SERVER INSTALLATION
          Proceeding with all-in-one components setup.
          -------------------------------------------------------
          (Waiting 10 seconds. Press Ctrl+C and 'C' to skip wait)
      when: 
        - groups['all'] | length == 1

- hosts: all
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/pre_installation_checks
     - ../roles/prepare_carbonio_vms
     - ../roles/install_carbonio_packages

- hosts: masterDirectoryServers, replicaDirectoryServers, postgresServers
  serial: 1
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_cluster_services

- hosts: all, !postgresServers, !masterDirectoryServers, !replicaDirectoryServers
  serial: 1
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_cluster_services

- hosts: masterDirectoryServers, replicaDirectoryServers, postgresServers
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_carbonio
     - ../roles/execute_final_setups

- hosts: all, !postgresServers, !masterDirectoryServers, !replicaDirectoryServers, !videoServers
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_carbonio
     - ../roles/execute_final_setups

- hosts: videoServers
  serial: 1
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_carbonio
     - ../roles/execute_final_setups

- hosts: all
  order: inventory
  gather_facts: yes
  tasks: 
    - name: Update auth keys
      become: true
      become_method: su
      become_user: zextras
      command: '/opt/zextras/bin/zmupdateauthkeys'

- hosts: all
  order: inventory
  gather_facts: yes
  tasks:
    - name: Single-Server Optimization Confirmation
      pause:
        prompt: |
          !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
          CONFIRMATION: SINGLE-SERVER OPTIMIZATION
          
          You are about to apply Single-Server specific settings.
          
          WARNING: After these optimizations are applied, it will 
          be IMPOSSIBLE to scale this infrastructure out to a 
          multi-server in the future.
          !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
          Type 'YES' to apply optimizations, or press ENTER to skip:
      register: ss_final_confirm
      when: 
        - groups['all'] | length == 1
        - autoapply_ss_optimization is not defined or autoapply_ss_optimization is none

    - name: Auto-apply Single-Server Optimization
      set_fact:
          ss_final_confirm:
            user_input: 'YES'
      when: 
        - groups['all'] | length == 1
        - autoapply_ss_optimization is defined
        - autoapply_ss_optimization is not none
        - (autoapply_ss_optimization | bool)

    - name: Auto-skip Single-Server Optimization
      set_fact:
          ss_final_confirm:
            user_input: ''
      when: 
        - groups['all'] | length == 1
        - autoapply_ss_optimization is defined
        - autoapply_ss_optimization is not none
        - not (autoapply_ss_optimization | bool)

    - name: Optimization Skipped Message
      debug:
        msg: "Optimization skipped. Single-server installation completed successfully without optimization."
      when: 
        - groups['all'] | length == 1
        - (ss_final_confirm.user_input | default('') | upper) != 'YES'

    - name: Include Single-Server Setup Role
      include_role:
        name: ../roles/single_server_setup
      when: 
        - groups['all'] | length == 1
        - (ss_final_confirm.user_input | default('') | upper) == 'YES'