---
- hosts: all
  gather_facts: no
  run_once: true
  tasks:
    - name: Notify Single-Server Installation
      debug:
        msg: 
          - "======================================================="
          - " DETECTED: SINGLE-SERVER INSTALLATION"
          - " Only one unique host found in the inventory."
          - "======================================================="
      when: groups['all'] | length == 1

    - name: Notify Multi-Server Installation
      debug:
        msg: 
          - "======================================================="
          - " DETECTED: MULTI-SERVER INSTALLATION"
          - " Multiple hosts found in the inventory."
          - "======================================================="
      when: groups['all'] | length > 1

    - name: Pause for 10 seconds to allow reading
      pause:
        seconds: 10

- hosts: all
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/pre_installation_checks
     - ../roles/prepare_carbonio_vms
     - ../roles/install_carbonio_packages

- hosts: masterDirectoryServers, replicaDirectoryServers, postgresServers
  serial: 1
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_cluster_services

- hosts: all, !postgresServers, !masterDirectoryServers, !replicaDirectoryServers
  serial: 1
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_cluster_services

- hosts: masterDirectoryServers, replicaDirectoryServers, postgresServers
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_carbonio
     - ../roles/execute_final_setups

- hosts: all, !postgresServers, !masterDirectoryServers, !replicaDirectoryServers, !videoServers
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_carbonio
     - ../roles/execute_final_setups

- hosts: videoServers
  serial: 1
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_carbonio
     - ../roles/execute_final_setups

- hosts: all
  order: inventory
  gather_facts: yes
  tasks: 
    - name: Update auth keys
      become: true
      become_method: su
      become_user: zextras
      command: '/opt/zextras/bin/zmupdateauthkeys'

- hosts: all
  order: inventory
  gather_facts: yes
  roles:
     - role: ../roles/single_server_setup
       when: groups['all'] | length == 1