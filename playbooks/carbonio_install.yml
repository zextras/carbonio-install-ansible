---
- hosts: all
  gather_facts: no
  run_once: true
  tasks:
      - name: Multi-Server Status and 10s Pause
        pause:
          seconds: 10
          prompt: |
            =======================================================
            DETECTED: MULTI-SERVER INSTALLATION
            Proceeding with distributed components setup.
            =======================================================
            (Waiting 10 seconds before continuing. Press Ctrl+C and 'C' to skip wait)
        when: groups['all'] | length > 1

      - name: Single-Server Warning and Confirmation
        pause:
          prompt: |
            !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
            WARNING: SINGLE-SERVER INSTALLATION DETECTED
            
            Please note that a single-server infrastructure is
            significantly harder to scale out to a multi-server
            cluster in the future.
            
            Make sure this matches your intended architecture.
            !!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
            Type 'YES' and press ENTER to proceed with SINGLE-SERVER: 
        register: single_node_confirm
        when: groups['all'] | length == 1

      - name: Abort if confirmation is not YES
        fail:
          msg: >
            Installation aborted. You must type 'YES' to proceed with SINGLE-SERVER 
            or update your inventory to continue with MULTI-SERVER INSTALLATION.
        when: 
          - groups['all'] | length == 1
          - (single_node_confirm.user_input | default('') | upper) != 'YES'

- hosts: all
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/pre_installation_checks
     - ../roles/prepare_carbonio_vms
     - ../roles/install_carbonio_packages

- hosts: masterDirectoryServers, replicaDirectoryServers, postgresServers
  serial: 1
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_cluster_services

- hosts: all, !postgresServers, !masterDirectoryServers, !replicaDirectoryServers
  serial: 1
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_cluster_services

- hosts: masterDirectoryServers, replicaDirectoryServers, postgresServers
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_carbonio
     - ../roles/execute_final_setups

- hosts: all, !postgresServers, !masterDirectoryServers, !replicaDirectoryServers, !videoServers
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_carbonio
     - ../roles/execute_final_setups

- hosts: videoServers
  serial: 1
  order: inventory
  gather_facts: yes
  roles:
     - ../roles/bootstrap_carbonio
     - ../roles/execute_final_setups

- hosts: all
  order: inventory
  gather_facts: yes
  tasks: 
    - name: Update auth keys
      become: true
      become_method: su
      become_user: zextras
      command: '/opt/zextras/bin/zmupdateauthkeys'

- hosts: all
  order: inventory
  gather_facts: yes
  roles:
     - role: ../roles/single_server_setup
       when: groups['all'] | length == 1